name: Deploy Frontend

on:
  push:
    branches:
      - main

concurrency:
  group: frontend-production-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build frontend
        env:
          VITE_API_BASE_URL: https://api.wizbizhubltd.com
        run: npm run build

      - name: Archive build output
        run: tar -czf frontend-dist.tar.gz dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact to server
        run: |
          scp -P "${{ secrets.SERVER_PORT }}" frontend-dist.tar.gz \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/frontend-dist.tar.gz"

      - name: Deploy on server
        run: |
          ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << EOF
            set -eu

            APP_DIR="${{ secrets.FRONTEND_APP_DIR }}"
            RELEASE_ID=\$(date +%Y%m%d-%H%M%S)
            RELEASE_DIR="\$APP_DIR/releases/\$RELEASE_ID"

            mkdir -p "\$APP_DIR/releases"
            mkdir -p "\$RELEASE_DIR"

            tar -xzf /tmp/frontend-dist.tar.gz -C "\$RELEASE_DIR"
            rm -f /tmp/frontend-dist.tar.gz

            # Vite/React build usually extracts to dist/
            ln -sfn "\$RELEASE_DIR/dist" "\$APP_DIR/current"

            sudo nginx -t
            sudo systemctl reload nginx
          EOF